services:
  backend:
    image: ${MEMORY_PALACE_BACKEND_IMAGE:-ghcr.io/agi-is-going-to-arrive/memory-palace-backend:latest}
    pull_policy: missing
    env_file:
      - ${MEMORY_PALACE_DOCKER_ENV_FILE:-./.env.docker}
    environment:
      # Docker defaults to WAL for the repository's named-volume deployment path.
      # If you replace these volumes with NFS/CIFS bind mounts, override both values.
      RUNTIME_WRITE_WAL_ENABLED: ${MEMORY_PALACE_DOCKER_WAL_ENABLED:-true}
      RUNTIME_WRITE_JOURNAL_MODE: ${MEMORY_PALACE_DOCKER_JOURNAL_MODE:-wal}
    volumes:
      - memory_palace_data:/app/data
      - memory_palace_snapshots:/app/snapshots
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MEMORY_PALACE_BACKEND_PORT:-${NOCTURNE_BACKEND_PORT:-18000}}:8000"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "/usr/local/bin/backend-healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${MEMORY_PALACE_FRONTEND_IMAGE:-ghcr.io/agi-is-going-to-arrive/memory-palace-frontend:latest}
    pull_policy: missing
    env_file:
      - ${MEMORY_PALACE_DOCKER_ENV_FILE:-./.env.docker}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${MEMORY_PALACE_FRONTEND_PORT:-${NOCTURNE_FRONTEND_PORT:-3000}}:8080"
    security_opt:
      - no-new-privileges:true
    # Fail closed and bypass inherited proxy env for the localhost probe.
    healthcheck:
      test:
        - CMD-SHELL
        - unset http_proxy HTTP_PROXY https_proxy HTTPS_PROXY all_proxy ALL_PROXY no_proxy NO_PROXY && wget -q -O /dev/null http://127.0.0.1:8080/
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  memory_palace_data:
    name: ${MEMORY_PALACE_DATA_VOLUME:-${NOCTURNE_DATA_VOLUME:-${COMPOSE_PROJECT_NAME:-memory-palace}_data}}
  memory_palace_snapshots:
    name: ${MEMORY_PALACE_SNAPSHOTS_VOLUME:-${NOCTURNE_SNAPSHOTS_VOLUME:-${COMPOSE_PROJECT_NAME:-memory-palace}_snapshots}}
