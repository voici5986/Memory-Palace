name: Publish Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - '.github/workflows/docker-publish.yml'
      - '.dockerignore'
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/docker/**'
      - 'docker-compose.yml'
      - 'docker-compose.ghcr.yml'
      - 'scripts/apply_profile.sh'
      - 'scripts/apply_profile.ps1'
      - 'scripts/docker_one_click.sh'
      - 'scripts/docker_one_click.ps1'

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Create backend virtualenv and install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend tests
        run: cd backend && .venv/bin/python -m pytest tests -q

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Run frontend typecheck
        run: cd frontend && npm run typecheck

      - name: Build frontend
        run: cd frontend && npm run build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize registry owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Dockerfile
        id: vars
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            echo "dockerfile=deploy/docker/Dockerfile.backend" >> "$GITHUB_OUTPUT"
          else
            echo "dockerfile=deploy/docker/Dockerfile.frontend" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner_lc }}/memory-palace-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build backend image for healthcheck validation
        if: matrix.service == 'backend'
        run: docker build -f deploy/docker/Dockerfile.backend -t memory-palace-backend-healthcheck:${{ github.sha }} .

      - name: Verify backend healthcheck helper is executable
        if: matrix.service == 'backend'
        run: |
          docker run --rm --entrypoint /bin/sh memory-palace-backend-healthcheck:${{ github.sha }} -c \
            'test -f /usr/local/bin/backend-healthcheck.py && test -x /usr/local/bin/backend-healthcheck.py'

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.vars.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
